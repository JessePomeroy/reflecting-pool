name: CI

on:
  push:
    branches: [main, "feature/*"]
  pull_request:
    branches: [main]

jobs:
  lint-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm biome check src/
      - run: npx svelte-check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  build:
    runs-on: ubuntu-latest
    needs: [lint-and-check, test]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
    env:
      # Dummy env vars for build (real ones set in Vercel)
      LUMAPRINTS_API_KEY: dummy
      LUMAPRINTS_API_SECRET: dummy
      LUMAPRINTS_STORE_ID: "0"
      STRIPE_SECRET_KEY: sk_test_dummy
      STRIPE_WEBHOOK_SECRET: whsec_dummy
      PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_dummy
      SANITY_PROJECT_ID: dummy
      SANITY_DATASET: production
      SANITY_API_TOKEN: dummy
      PUBLIC_SITE_URL: http://localhost
      RESEND_API_KEY: dummy
      ADMIN_EMAIL: test@test.com
