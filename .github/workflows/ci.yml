name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Audit H34: cancel in-progress runs for the same ref when a newer push arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        env:
          NPM_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      # Audit M14: match the local `pnpm lint` command (biome check .) so CI
      # and local linting agree on scope. Previously CI scanned only src/,
      # which meant scripts/ and convex/ lint errors slipped through.
      - name: Lint
        run: pnpm lint

      - name: Type check
        env:
          STRIPE_SECRET_KEY: placeholder
          STRIPE_WEBHOOK_SECRET: placeholder
          RESEND_API_KEY: placeholder
          SANITY_API_TOKEN: placeholder
          SANITY_DATASET: production
          SANITY_PROJECT_ID: placeholder
          LUMAPRINTS_API_KEY: placeholder
          LUMAPRINTS_API_SECRET: placeholder
          LUMAPRINTS_STORE_ID: placeholder
          LUMAPRINTS_USE_SANDBOX: "true"
          PUBLIC_SITE_URL: https://placeholder.com
          PUBLIC_CONVEX_URL: https://placeholder.convex.cloud
          GALLERY_WORKER_URL: placeholder
          GALLERY_ADMIN_SECRET: placeholder
        run: pnpm check

      # Audit H33: run the full vitest suite on every PR / push so regressions
      # in webhook math, pricing, LumaPrints encoder, or coupon math land in
      # the status check, not in production.
      - name: Tests
        run: pnpm test
