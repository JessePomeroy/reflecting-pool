name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        env:
          NPM_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Lint
        run: pnpm biome check src/

      - name: Type check
        env:
          STRIPE_SECRET_KEY: placeholder
          STRIPE_WEBHOOK_SECRET: placeholder
          RESEND_API_KEY: placeholder
          SANITY_API_TOKEN: placeholder
          SANITY_DATASET: production
          SANITY_PROJECT_ID: placeholder
          LUMAPRINTS_API_KEY: placeholder
          LUMAPRINTS_API_SECRET: placeholder
          LUMAPRINTS_STORE_ID: placeholder
          LUMAPRINTS_USE_SANDBOX: "true"
          PUBLIC_SITE_URL: https://placeholder.com
          PUBLIC_CONVEX_URL: https://placeholder.convex.cloud
        run: npx svelte-kit sync && npx svelte-check --threshold error
